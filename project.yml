name: SystemPeek
options:
  bundleIdPrefix: com.chrys
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    CODE_SIGN_STYLE: Manual
    CODE_SIGN_IDENTITY: "-"
    DEVELOPMENT_TEAM: ""
targets:
  SystemPeek:
    type: application
    platform: macOS
    sources:
      - SystemPeek
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrys.SystemPeek
        INFOPLIST_FILE: SystemPeek/Info.plist
        CODE_SIGN_ENTITLEMENTS: SystemPeek/SystemPeek.entitlements
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
  SystemPeekTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - SystemPeekTests
    dependencies:
      - target: SystemPeek
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrys.SystemPeekTests
  SystemPeekUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - SystemPeekUITests
    dependencies:
      - target: SystemPeek
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chrys.SystemPeekUITests
        TEST_TARGET_NAME: SystemPeek
schemes:
  SystemPeek:
    build:
      targets:
        SystemPeek: all
        SystemPeekTests: [test]
        SystemPeekUITests: [test]
    test:
      targets:
        - SystemPeekTests
        - SystemPeekUITests
    run:
      config: Debug
